version: "3.9"

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: docuchat-backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./backend/uploads:/app/backend/uploads
      - ./backend/logs:/app/backend/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: docuchat-frontend
    ports:
      - "8501:8501"
    environment:
      - BACKEND_API_URL=http://backend:8000/api/v1
    depends_on:
      - backend
    restart: unless-stopped

# NOTE: PostgreSQL is not defined here because this project targets
# Neon's managed serverless Postgres (with pgvector) via DATABASE_URL
# in .env. If you want a local Postgres instead, add a `db` service
# using the `pgvector/pgvector:pg16` image and point DATABASE_URL at it.
